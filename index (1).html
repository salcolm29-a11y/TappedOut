<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TappedOut 🪫</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2220%22>🪫</text></svg>">
<style>
  :root{
    --bg:#FAFAF7;
    --surface:#FFFFFF;
    --border:#E4E1D9;
    --text:#16150F;
    --text-dim:#7A7868;
    --accent:#FF5A36;
    --accent-dim:#FFE3D9;
    --live:#3DDC84;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:600px;
    margin:0 auto;
    min-height:100vh;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    background:var(--surface);
  }

  /* HEADER */
  header{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand svg{display:block;}
  .brand .name{
    font-family:var(--mono);
    font-weight:700;
    font-size:15px;
    letter-spacing:0.04em;
  }
  .sync{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--live);
    box-shadow:0 0 0 0 rgba(61,220,132,0.6);
  }
  .dot.flash{
    animation:flash 0.7s ease-out;
  }
  @keyframes flash{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,0.6);}
    70%{box-shadow:0 0 0 8px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }
  .me{
    display:flex;align-items:center;gap:6px;
    font-size:13px;color:var(--text-dim);
    cursor:pointer;
    background:none;border:none;
    font-family:var(--sans);
    padding:0;
  }
  .me .avatar{font-size:16px;}
  .me:hover{color:var(--text);}

  /* COMPOSER */
  .composer{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
  }
  .composer textarea{
    width:100%;
    min-height:64px;
    resize:vertical;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    font-family:var(--sans);
    font-size:15px;
    color:var(--text);
    background:var(--bg);
    outline:none;
  }
  .composer textarea:focus{border-color:var(--text-dim);}
  .composer textarea::placeholder{color:var(--text-dim);}
  .composer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    gap:10px;
  }
  .btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    border-radius:8px;
    padding:9px 14px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    cursor:pointer;
    transition:transform 0.08s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn:hover{border-color:var(--text-dim);}
  .btn-accent{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .btn-accent:hover{background:#e94e2c;border-color:#e94e2c;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .char-count{font-family:var(--mono);font-size:11px;color:var(--text-dim);}

  /* FEED */
  .feed{padding:4px 0 60px;}
  .empty{
    padding:60px 24px;
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
  }
  .empty .big{font-size:36px;display:block;margin-bottom:10px;}
  .post{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:12px;
    animation:in 0.25s ease;
  }
  @keyframes in{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .post .avatar{
    width:38px;height:38px;
    border-radius:50%;
    background:var(--bg);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .post-main{flex:1;min-width:0;}
  .post-meta{
    display:flex;align-items:baseline;gap:6px;
    flex-wrap:wrap;
  }
  .post-meta .pname{font-weight:700;font-size:14px;}
  .post-meta .phandle, .post-meta .ptime{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-dim);
  }
  .post-content{
    margin-top:4px;
    font-size:15px;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .reactions{
    display:flex;gap:6px;margin-top:10px;
  }
  .react{
    display:flex;align-items:center;gap:5px;
    border:1px solid var(--border);
    border-radius:20px;
    padding:4px 10px;
    font-size:13px;
    background:var(--surface);
    cursor:pointer;
    color:var(--text-dim);
    font-family:var(--sans);
  }
  .react .count{font-family:var(--mono);font-size:12px;}
  .react.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent);
  }
  .react:hover{border-color:var(--text-dim);}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(22,21,15,0.45);
    display:none;align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.visible{
    display:flex;
  }
  .modal{
    background:var(--surface);
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:100%;
    text-align:center;
  }
  .modal .big-emoji{font-size:40px;}
  .modal h2{
    font-family:var(--mono);
    font-size:18px;
    margin:8px 0 4px;
    letter-spacing:0.02em;
  }
  .modal p{
    color:var(--text-dim);
    font-size:13.5px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .modal input{
    width:100%;
    padding:11px 14px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:15px;
    font-family:var(--sans);
    outline:none;
    margin-bottom:14px;
  }
  .modal input:focus{border-color:var(--text-dim);}
  .modal .btn-accent{width:100%;padding:11px;font-size:14px;}

  @media (max-width:480px){
    .wrap{border-left:none;border-right:none;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <svg id="battery" width="26" height="14" viewBox="0 0 26 14" fill="none">
        <rect x="0.5" y="0.5" width="21" height="13" rx="2.5" stroke="var(--text)" stroke-opacity="0.5"/>
        <rect x="22.5" y="4" width="2.5" height="6" rx="1" fill="var(--text)" fill-opacity="0.5"/>
        <rect id="battery-fill" x="2.5" y="2.5" width="17" height="9" rx="1.2" fill="var(--accent)"/>
      </svg>
      <span class="name">TAPPEDOUT</span>
    </div>
    <div class="sync">
      <span class="dot" id="syncdot"></span>
      <span id="synctext">connecting…</span>
    </div>
    <button class="me" id="mebtn" title="Change name">
      <span class="avatar" id="meavatar">🫥</span>
      <span id="mename">—</span>
    </button>
  </header>

  <div class="composer">
    <textarea id="postInput" maxlength="280" placeholder="what unproductive thing happened today..."></textarea>
    <div class="composer-row">
      <span class="char-count"><span id="charcount">0</span>/280</span>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="corporateBtn">Make it LinkedIn-y 💼</button>
        <button class="btn btn-accent" id="postBtn">Post</button>
      </div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty">
      <span class="big">🪫</span>
      Loading the feed of shame…
    </div>
  </div>
</div>

<div class="modal-overlay" id="joinOverlay">
  <div class="modal">
    <div class="big-emoji">🪫</div>
    <h2>WELCOME TO TAPPEDOUT</h2>
    <p>The opposite of LinkedIn. Post your most uninspiring moment. No hustle culture allowed.</p>
    <input id="joinName" type="text" placeholder="what should we call you?" maxlength="24" />
    <button class="btn btn-accent" id="joinBtn">Join the feed</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---------- CONFIG ----------
  const SUPABASE_URL = "https://rnksamdmivxpsijynfql.supabase.co";
  const SUPABASE_KEY = "sb_publishable_2T2hxCm6WhtgX1K0eUVADQ_cEZST9FT";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const REACTIONS = ["💀", "🍺", "🫂"];
  const AVATARS = ["🫠","🥴","😵‍💫","🙃","😴","🫥","🤡","🥱","😬","🫣","🙈","🍷","🚬","🛋️","🫩"];

  // ---------- STATE ----------
  let currentUser = JSON.parse(localStorage.getItem("tappedout_user") || "null");
  let posts = [];
  let reactions = [];
  let lastEventAt = Date.now();

  // ---------- HELPERS ----------
  function randomAvatar(){ return AVATARS[Math.floor(Math.random()*AVATARS.length)]; }

  function makeHandle(name){
    const base = name.trim().toLowerCase().replace(/[^a-z0-9]+/g,"") || "anon";
    const num = Math.floor(Math.random()*900+100);
    return "@" + base + num;
  }

  function timeAgo(iso){
    const diff = Math.floor((Date.now() - new Date(iso).getTime())/1000);
    if(diff < 10) return "just now";
    if(diff < 60) return diff + "s ago";
    if(diff < 3600) return Math.floor(diff/60) + "m ago";
    if(diff < 86400) return Math.floor(diff/3600) + "h ago";
    return Math.floor(diff/86400) + "d ago";
  }

  function escapeHtml(str){
    const d = document.createElement("div");
    d.innerText = str;
    return d.innerHTML;
  }

  // ---------- BATTERY (decorative, drains over time, recharges on activity) ----------
  function updateBattery(){
    const secsSince = (Date.now() - lastEventAt) / 1000;
    // full charge at 0s of silence, empty after ~20 min of silence
    const pct = Math.max(0.08, 1 - Math.min(secsSince / 1200, 0.92));
    document.getElementById("battery-fill").setAttribute("width", (17 * pct).toFixed(1));
    const fillEl = document.getElementById("battery-fill");
    fillEl.setAttribute("fill", pct < 0.25 ? "#FF5A36" : pct < 0.6 ? "#E8B23D" : "#3DDC84");
  }
  setInterval(updateBattery, 4000);

  function flashSync(){
    const dot = document.getElementById("syncdot");
    dot.classList.remove("flash");
    requestAnimationFrame(()=> dot.classList.add("flash"));
    document.getElementById("synctext").textContent = "live · " + new Date().toLocaleTimeString();
    lastEventAt = Date.now();
    updateBattery();
  }

  // ---------- CORPORATIFY (local, no API needed) ----------
  const TEMPLATES = [
    c => `Incredibly humbled to share a major personal milestone: ${c}. Grateful doesn't even begin to cover it 🙏 #blessed #growthmindset`,
    c => `Thrilled to announce that ${c}. None of this would've been possible without my incredible support network. #grateful #hustle`,
    c => `Hot take 🔥: ${c}. Sometimes the best ROI comes from the most unexpected places. #leadership #disruptive`,
    c => `Reflecting on today's journey... ${c}. Proud of how far I've come. Onwards and upwards 📈 #authenticity`,
    c => `Big announcement 📢: ${c}. Excited for what this means for my personal brand going forward. #opportunity #synergy`,
    c => `Vulnerability time: ${c}. They say growth happens outside your comfort zone. Thoughts? 👇 #leadership #mindset`,
    c => `I'm not usually one to brag, but ${c}. Just goes to show — consistency is everything. #motivation #grindneverstops`,
    c => `Lessons learned this quarter: ${c}. Failing forward is still forward. #resilience #entrepreneurship`,
  ];
  function corporatify(text){
    let c = text.trim();
    if(!c) return c;
    c = c.charAt(0).toLowerCase() + c.slice(1);
    const tpl = TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];
    return tpl(c);
  }

  // ---------- RENDER ----------
  function render(){
    const feed = document.getElementById("feed");
    if(!posts.length){
      feed.innerHTML = `<div class="empty"><span class="big">🪫</span>No one's posted their L's yet.<br>Be the first to overshare.</div>`;
      return;
    }
    feed.innerHTML = posts.map(p => {
      const counts = {};
      const mine = {};
      reactions.filter(r => r.post_id === p.id).forEach(r => {
        counts[r.emoji] = (counts[r.emoji] || 0) + 1;
        if(currentUser && r.username === currentUser.handle) mine[r.emoji] = true;
      });
      const reactHtml = REACTIONS.map(e => {
        const n = counts[e] || 0;
        const active = mine[e] ? "active" : "";
        return `<button class="react ${active}" data-post="${p.id}" data-emoji="${e}">
          <span>${e}</span><span class="count">${n > 0 ? n : ""}</span>
        </button>`;
      }).join("");
      return `<div class="post">
        <div class="avatar">${p.avatar}</div>
        <div class="post-main">
          <div class="post-meta">
            <span class="pname">${escapeHtml(p.name)}</span>
            <span class="phandle">${escapeHtml(p.handle)}</span>
            <span class="ptime">· ${timeAgo(p.created_at)}</span>
          </div>
          <div class="post-content">${escapeHtml(p.content)}</div>
          <div class="reactions">${reactHtml}</div>
        </div>
      </div>`;
    }).join("");

    feed.querySelectorAll(".react").forEach(btn => {
      btn.addEventListener("click", () => toggleReaction(btn.dataset.post, btn.dataset.emoji));
    });
  }

  setInterval(render, 15000); // keep "Xm ago" labels fresh

  // ---------- DATA ----------
  async function loadAll(){
    const [{data: p, error: pe}, {data: r, error: re}] = await Promise.all([
      sb.from("posts").select("*").order("created_at", {ascending:false}),
      sb.from("reactions").select("*"),
    ]);
    if(pe) console.error(pe);
    if(re) console.error(re);
    posts = p || [];
    reactions = r || [];
    render();
  }

  async function submitPost(){
    const input = document.getElementById("postInput");
    const content = input.value.trim();
    if(!content || !currentUser) return;
    document.getElementById("postBtn").disabled = true;
    const {error} = await sb.from("posts").insert({
      name: currentUser.name,
      handle: currentUser.handle,
      avatar: currentUser.avatar,
      content,
    });
    document.getElementById("postBtn").disabled = false;
    if(error){ alert("Couldn't post — try again."); console.error(error); return; }
    input.value = "";
    document.getElementById("charcount").textContent = "0";
  }

  async function toggleReaction(postId, emoji){
    if(!currentUser) return;
    const existing = reactions.find(r => r.post_id === postId && r.username === currentUser.handle && r.emoji === emoji);
    if(existing){
      await sb.from("reactions").delete().eq("id", existing.id);
    } else {
      await sb.from("reactions").insert({post_id: postId, username: currentUser.handle, emoji});
    }
  }

  // ---------- REALTIME ----------
  function subscribeRealtime(){
    sb.channel("tappedout-feed")
      .on("postgres_changes", {event:"*", schema:"public", table:"posts"}, () => { flashSync(); loadAll(); })
      .on("postgres_changes", {event:"*", schema:"public", table:"reactions"}, () => { flashSync(); loadAll(); })
      .subscribe(status => {
        if(status === "SUBSCRIBED"){
          document.getElementById("synctext").textContent = "live · " + new Date().toLocaleTimeString();
        }
      });
  }

  // ---------- JOIN FLOW ----------
  function showJoin(){
    document.getElementById("joinOverlay").classList.add("visible");
  }
  function hideJoin(){
    document.getElementById("joinOverlay").classList.remove("visible");
  }
  function applyUserToHeader(){
    if(!currentUser) return;
    document.getElementById("meavatar").textContent = currentUser.avatar;
    document.getElementById("mename").textContent = currentUser.name;
  }

  document.getElementById("joinBtn").addEventListener("click", () => {
    const name = document.getElementById("joinName").value.trim();
    if(!name) return;
    currentUser = { name, handle: makeHandle(name), avatar: randomAvatar() };
    localStorage.setItem("tappedout_user", JSON.stringify(currentUser));
    applyUserToHeader();
    hideJoin();
    render();
  });
  document.getElementById("joinName").addEventListener("keydown", e => {
    if(e.key === "Enter") document.getElementById("joinBtn").click();
  });

  document.getElementById("mebtn").addEventListener("click", showJoin);

  document.getElementById("postBtn").addEventListener("click", submitPost);
  document.getElementById("corporateBtn").addEventListener("click", () => {
    const input = document.getElementById("postInput");
    input.value = corporatify(input.value || "");
    document.getElementById("charcount").textContent = input.value.length;
  });
  document.getElementById("postInput").addEventListener("input", e => {
    document.getElementById("charcount").textContent = e.target.value.length;
  });
  document.getElementById("postInput").addEventListener("keydown", e => {
    if(e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitPost();
  });

  // ---------- INIT ----------
  (function init(){
    if(currentUser){
      applyUserToHeader();
    } else {
      showJoin();
    }
    updateBattery();
    loadAll();
    subscribeRealtime();
  })();
</script>
</body>
</html>
