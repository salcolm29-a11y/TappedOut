<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TappedOut 🪫</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2220%22>🪫</text></svg>">
<style>
  :root{
    --bg:#FAFAF7;
    --surface:#FFFFFF;
    --border:#E4E1D9;
    --text:#16150F;
    --text-dim:#7A7868;
    --accent:#FF5A36;
    --accent-dim:#FFE3D9;
    --live:#3DDC84;
    --gold:#E8B23D;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:600px;
    margin:0 auto;
    min-height:100vh;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    background:var(--surface);
  }

  /* HEADER */
  header{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand svg{display:block;}
  .brand .name{
    font-family:var(--mono);
    font-weight:700;
    font-size:15px;
    letter-spacing:0.04em;
  }
  .header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .icon-btn{
    background:none;border:none;cursor:pointer;
    font-size:16px;
    padding:4px;
    border-radius:6px;
    color:var(--text-dim);
    line-height:1;
  }
  .icon-btn:hover{background:var(--bg);color:var(--text);}
  .sync{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--live);
    box-shadow:0 0 0 0 rgba(61,220,132,0.6);
  }
  .dot.flash{animation:flash 0.7s ease-out;}
  @keyframes flash{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,0.6);}
    70%{box-shadow:0 0 0 8px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }
  .me{
    display:flex;align-items:center;gap:6px;
    font-size:13px;color:var(--text-dim);
    cursor:pointer;
    background:none;border:none;
    font-family:var(--sans);
    padding:0;
  }
  .me .avatar{font-size:16px;}
  .me:hover{color:var(--text);}

  /* SUBNAV */
  .subnav{
    display:flex;
    border-bottom:1px solid var(--border);
  }
  .subnav button{
    flex:1;
    padding:10px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:var(--mono);
    font-size:11.5px;
    letter-spacing:0.03em;
    color:var(--text-dim);
    border-bottom:2px solid transparent;
  }
  .subnav button.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }

  /* COMPOSER */
  .composer{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
  }
  .composer textarea{
    width:100%;
    min-height:64px;
    resize:vertical;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    font-family:var(--sans);
    font-size:15px;
    color:var(--text);
    background:var(--bg);
    outline:none;
  }
  .composer textarea:focus{border-color:var(--text-dim);}
  .composer textarea::placeholder{color:var(--text-dim);}
  .image-preview{
    margin-top:10px;
    position:relative;
    display:inline-block;
  }
  .image-preview img{
    max-height:140px;
    border-radius:10px;
    border:1px solid var(--border);
    display:block;
  }
  .image-preview .remove-img{
    position:absolute;top:-8px;right:-8px;
    width:22px;height:22px;border-radius:50%;
    background:var(--text);color:#fff;
    border:none;cursor:pointer;
    font-size:13px;line-height:1;
  }
  .composer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    gap:10px;
  }
  .composer-left{display:flex;align-items:center;gap:10px;}
  .btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    border-radius:8px;
    padding:9px 14px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    cursor:pointer;
    transition:transform 0.08s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn:hover{border-color:var(--text-dim);}
  .btn-accent{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .btn-accent:hover{background:#e94e2c;border-color:#e94e2c;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .char-count{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
  .img-btn{
    font-size:18px;
    background:none;border:none;cursor:pointer;
    color:var(--text-dim);
    padding:4px;
  }
  .img-btn:hover{color:var(--text);}

  /* FEED */
  .feed{padding:4px 0 60px;}
  .empty{
    padding:60px 24px;
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
  }
  .empty .big{font-size:36px;display:block;margin-bottom:10px;}
  .post{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:12px;
    animation:in 0.25s ease;
  }
  @keyframes in{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .post .avatar{
    width:38px;height:38px;
    border-radius:50%;
    background:var(--bg);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .post-main{flex:1;min-width:0;}
  .post-meta{
    display:flex;align-items:baseline;gap:6px;
    flex-wrap:wrap;
  }
  .post-meta .pname{font-weight:700;font-size:14px;}
  .post-meta .phandle, .post-meta .ptime{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-dim);
  }
  .del-btn{
    margin-left:auto;
    background:none;border:none;cursor:pointer;
    color:var(--text-dim);
    font-size:12px;
    font-family:var(--mono);
    padding:2px 4px;
  }
  .del-btn:hover{color:var(--accent);}
  .post-content{
    margin-top:4px;
    font-size:15px;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .post-image{
    margin-top:10px;
    max-width:100%;
    max-height:320px;
    border-radius:10px;
    border:1px solid var(--border);
    display:block;
  }
  .reactions{
    display:flex;gap:6px;margin-top:10px;
  }
  .react{
    display:flex;align-items:center;gap:5px;
    border:1px solid var(--border);
    border-radius:20px;
    padding:4px 10px;
    font-size:13px;
    background:var(--surface);
    cursor:pointer;
    color:var(--text-dim);
    font-family:var(--sans);
  }
  .react .count{font-family:var(--mono);font-size:12px;}
  .react.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent);
  }
  .react:hover{border-color:var(--text-dim);}

  /* LEADERBOARD */
  .board{padding:16px 18px;}
  .board-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .board-rank{
    font-family:var(--mono);
    font-weight:700;
    font-size:15px;
    color:var(--text-dim);
    width:22px;
    flex-shrink:0;
  }
  .board-rank.gold{color:var(--gold);}
  .board-avatar{font-size:20px;flex-shrink:0;}
  .board-body{flex:1;min-width:0;}
  .board-body .bname{font-weight:700;font-size:13.5px;}
  .board-body .bcontent{
    font-size:13.5px;color:var(--text-dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .board-score{
    font-family:var(--mono);
    font-size:13px;
    color:var(--accent);
    flex-shrink:0;
  }

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(22,21,15,0.45);
    display:none;align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.visible{display:flex;}
  .modal{
    background:var(--surface);
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:100%;
    text-align:center;
  }
  .modal .big-emoji{font-size:40px;}
  .modal h2{
    font-family:var(--mono);
    font-size:18px;
    margin:8px 0 4px;
    letter-spacing:0.02em;
  }
  .modal p{
    color:var(--text-dim);
    font-size:13.5px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .modal input{
    width:100%;
    padding:11px 14px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:15px;
    font-family:var(--sans);
    outline:none;
    margin-bottom:14px;
  }
  .modal input:focus{border-color:var(--text-dim);}
  .modal .btn-accent{width:100%;padding:11px;font-size:14px;}

  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%);
    background:var(--text);
    color:#fff;
    font-size:13px;
    padding:10px 16px;
    border-radius:8px;
    z-index:200;
    opacity:0;
    transition:opacity 0.2s ease;
    pointer-events:none;
    max-width:90%;
    text-align:center;
  }
  .toast.show{opacity:1;}

  @media (max-width:480px){
    .wrap{border-left:none;border-right:none;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <svg id="battery" width="26" height="14" viewBox="0 0 26 14" fill="none">
        <rect x="0.5" y="0.5" width="21" height="13" rx="2.5" stroke="var(--text)" stroke-opacity="0.5"/>
        <rect x="22.5" y="4" width="2.5" height="6" rx="1" fill="var(--text)" fill-opacity="0.5"/>
        <rect id="battery-fill" x="2.5" y="2.5" width="17" height="9" rx="1.2" fill="var(--accent)"/>
      </svg>
      <span class="name">TAPPEDOUT</span>
    </div>
    <div class="sync">
      <span class="dot" id="syncdot"></span>
      <span id="synctext">connecting…</span>
      <button class="icon-btn" id="refreshBtn" title="Refresh now" style="font-size:13px;">🔄</button>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="notifyBtn" title="Get notified">🔔</button>
      <button class="me" id="mebtn" title="Change name">
        <span class="avatar" id="meavatar">🫥</span>
        <span id="mename">—</span>
      </button>
    </div>
  </header>

  <div class="subnav">
    <button class="active" id="tabFeed">FEED</button>
    <button id="tabBoard">🏆 MOST TAPPED OUT</button>
  </div>

  <div id="composerWrap" class="composer">
    <textarea id="postInput" maxlength="280" placeholder="what unproductive thing happened today..."></textarea>
    <div id="imagePreviewWrap"></div>
    <div class="composer-row">
      <div class="composer-left">
        <span class="char-count"><span id="charcount">0</span>/280</span>
        <label class="img-btn" title="Attach image">
          🖼️<input type="file" id="imageInput" accept="image/*" style="display:none;">
        </label>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="corporateBtn">Make it LinkedIn-y 💼</button>
        <button class="btn btn-accent" id="postBtn">Post</button>
      </div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty">
      <span class="big">🪫</span>
      Loading the feed of shame…
    </div>
  </div>

  <div class="board" id="board" style="display:none;"></div>
</div>

<div class="modal-overlay" id="joinOverlay">
  <div class="modal">
    <div class="big-emoji">🪫</div>
    <h2>WELCOME TO TAPPEDOUT</h2>
    <p>The opposite of LinkedIn. Post your most uninspiring moment. No hustle culture allowed.</p>
    <input id="joinName" type="text" placeholder="what should we call you?" maxlength="24" />
    <label class="img-btn" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);margin-bottom:14px;cursor:pointer;">
      📷 add a profile picture (optional)
      <input type="file" id="joinPhotoInput" accept="image/*" style="display:none;">
    </label>
    <div id="joinPhotoPreviewWrap"></div>
    <button class="btn btn-accent" id="joinBtn">Join the feed</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---------- CONFIG ----------
  const SUPABASE_URL = "https://rnksamdmivxpsijynfql.supabase.co";
  const SUPABASE_KEY = "sb_publishable_2T2hxCm6WhtgX1K0eUVADQ_cEZST9FT";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const REACTIONS = ["💀", "🍺", "🫂", "✌️"];
  const AVATARS = ["🫠","🥴","😵‍💫","🙃","😴","🫥","🤡","🥱","😬","🫣","🙈","🍷","🚬","🛋️","🫩"];
  const POST_COOLDOWN_MS = 10000;

  // ---------- STATE ----------
  let currentUser = JSON.parse(localStorage.getItem("tappedout_user") || "null");
  let posts = [];
  let reactions = [];
  let lastEventAt = Date.now();
  let pendingImageDataUrl = null;
  let pendingImageFile = null;
  let pendingJoinPhotoDataUrl = null;
  let pendingJoinPhotoFile = null;
  let lastPostAt = 0;
  let activeTab = "feed";
  let knownPostIds = new Set();
  let notificationsOn = localStorage.getItem("tappedout_notify") === "1";
  let comments = [];
  let openCommentPostIds = new Set();
  let profileHandle = null; // when set, feed is filtered to just this person's posts

  // ---------- HELPERS ----------
  function randomAvatar(){ return AVATARS[Math.floor(Math.random()*AVATARS.length)]; }

  function makeHandle(name){
    const base = name.trim().toLowerCase().replace(/[^a-z0-9]+/g,"") || "anon";
    const num = Math.floor(Math.random()*900+100);
    return "@" + base + num;
  }

  function timeAgo(iso){
    const diff = Math.floor((Date.now() - new Date(iso).getTime())/1000);
    if(diff < 10) return "just now";
    if(diff < 60) return diff + "s ago";
    if(diff < 3600) return Math.floor(diff/60) + "m ago";
    if(diff < 86400) return Math.floor(diff/3600) + "h ago";
    return Math.floor(diff/86400) + "d ago";
  }

  function escapeHtml(str){
    const d = document.createElement("div");
    d.innerText = str;
    return d.innerHTML;
  }

  function avatarHtml(photoUrl, emoji, sizePx){
    if(photoUrl){
      return `<img src="${escapeHtml(photoUrl)}" style="width:${sizePx}px;height:${sizePx}px;border-radius:50%;object-fit:cover;display:block;border:1px solid var(--border);">`;
    }
    return `<span style="font-size:${Math.round(sizePx*0.5)}px;">${emoji}</span>`;
  }

  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove("show"), 2600);
  }

  // ---------- BATTERY ----------
  function updateBattery(){
    const secsSince = (Date.now() - lastEventAt) / 1000;
    const pct = Math.max(0.08, 1 - Math.min(secsSince / 1200, 0.92));
    const fillEl = document.getElementById("battery-fill");
    fillEl.setAttribute("width", (17 * pct).toFixed(1));
    fillEl.setAttribute("fill", pct < 0.25 ? "#FF5A36" : pct < 0.6 ? "#E8B23D" : "#3DDC84");
  }
  setInterval(updateBattery, 4000);

  function flashSync(){
    const dot = document.getElementById("syncdot");
    dot.classList.remove("flash");
    requestAnimationFrame(()=> dot.classList.add("flash"));
    document.getElementById("synctext").textContent = "live · " + new Date().toLocaleTimeString();
    lastEventAt = Date.now();
    updateBattery();
  }

  // ---------- CORPORATIFY (local fallback templates) ----------
  const TEMPLATES = [
    c => `Incredibly humbled to share a major personal milestone: ${c}. Grateful doesn't even begin to cover it 🙏 #blessed #growthmindset`,
    c => `Thrilled to announce that ${c}. None of this would've been possible without my incredible support network. #grateful #hustle`,
    c => `Hot take 🔥: ${c}. Sometimes the best ROI comes from the most unexpected places. #leadership #disruptive`,
    c => `Reflecting on today's journey... ${c}. Proud of how far I've come. Onwards and upwards 📈 #authenticity`,
    c => `Big announcement 📢: ${c}. Excited for what this means for my personal brand going forward. #opportunity #synergy`,
    c => `Vulnerability time: ${c}. They say growth happens outside your comfort zone. Thoughts? 👇 #leadership #mindset`,
    c => `I'm not usually one to brag, but ${c}. Just goes to show — consistency is everything. #motivation #grindneverstops`,
    c => `Lessons learned this quarter: ${c}. Failing forward is still forward. #resilience #entrepreneurship`,
  ];
  function localCorporatify(text){
    let c = text.trim();
    if(!c) return c;
    c = c.charAt(0).toLowerCase() + c.slice(1);
    const tpl = TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];
    return tpl(c);
  }

  async function corporatify(text){
    if(!text.trim()) return text;
    // Try a real AI Supabase Edge Function first; silently fall back if it doesn't exist / fails.
    try{
      const {data, error} = await sb.functions.invoke("corporatify", { body: { text } });
      if(!error && data && data.result){
        return data.result;
      }
    } catch(e){ /* edge function not deployed yet — that's fine */ }
    return localCorporatify(text);
  }

  // ---------- IMAGE HANDLING ----------
  function renderImagePreview(){
    const wrap = document.getElementById("imagePreviewWrap");
    if(!pendingImageDataUrl){ wrap.innerHTML = ""; return; }
    wrap.innerHTML = `<div class="image-preview">
      <img src="${pendingImageDataUrl}">
      <button class="remove-img" id="removeImgBtn">✕</button>
    </div>`;
    document.getElementById("removeImgBtn").addEventListener("click", () => {
      pendingImageDataUrl = null;
      pendingImageFile = null;
      document.getElementById("imageInput").value = "";
      renderImagePreview();
    });
  }

  document.getElementById("joinPhotoInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    pendingJoinPhotoFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingJoinPhotoDataUrl = ev.target.result;
      document.getElementById("joinPhotoPreviewWrap").innerHTML =
        `<div class="image-preview"><img src="${pendingJoinPhotoDataUrl}" style="max-height:80px;border-radius:50%;"></div>`;
    };
    reader.readAsDataURL(file);
  });

  async function uploadToBucket(bucket, file){
    if(!file) return null;
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const {error} = await sb.storage.from(bucket).upload(path, file);
    if(error){ console.error(error); return null; }
    const {data} = sb.storage.from(bucket).getPublicUrl(path);
    return data.publicUrl;
  }

  document.getElementById("imageInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    pendingImageFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImageDataUrl = ev.target.result;
      renderImagePreview();
    };
    reader.readAsDataURL(file);
  });

  async function uploadImageIfNeeded(){
    if(!pendingImageFile) return null;
    const url = await uploadToBucket("post-images", pendingImageFile);
    if(!url) showToast("Image upload failed — posting without it.");
    return url;
  }

  // ---------- RENDER: FEED ----------
  function renderProfileBar(){
    const existing = document.getElementById("profileBar");
    if(existing) existing.remove();
    if(!profileHandle) return;
    const samplePost = posts.find(p => p.handle === profileHandle);
    const name = samplePost ? samplePost.name : profileHandle;
    const photo = samplePost ? samplePost.photo_url : null;
    const avatar = samplePost ? samplePost.avatar : "🫥";
    const count = posts.filter(p => p.handle === profileHandle).length;
    const bar = document.createElement("div");
    bar.id = "profileBar";
    bar.style = "padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;";
    bar.innerHTML = `
      <button class="icon-btn" id="backFromProfile" style="font-size:18px;">←</button>
      <div style="width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;">${avatarHtml(photo, avatar, 38)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14px;">${escapeHtml(name)}</div>
        <div style="font-family:var(--mono);font-size:11.5px;color:var(--text-dim);">${escapeHtml(profileHandle)} · ${count} post${count===1?"":"s"}</div>
      </div>
      <button class="btn" id="copyProfileLink" style="font-size:12px;padding:7px 10px;">🔗 copy link</button>
    `;
    document.getElementById("feed").before(bar);
    document.getElementById("backFromProfile").addEventListener("click", () => { profileHandle = null; render(); });
    document.getElementById("copyProfileLink").addEventListener("click", () => {
      const url = `${location.origin}${location.pathname}?u=${encodeURIComponent(profileHandle)}`;
      navigator.clipboard.writeText(url).then(() => showToast("Profile link copied!"));
    });
  }

  function commentsHtml(postId){
    const postComments = comments.filter(c => c.post_id === postId);
    const isOpen = openCommentPostIds.has(postId);
    const countLabel = postComments.length ? `${postComments.length} comment${postComments.length===1?"":""}` : "comment";
    let inner = "";
    if(isOpen){
      const list = postComments.map(c => `
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">${avatarHtml(c.photo_url, c.avatar, 24)}</div>
          <div style="flex:1;min-width:0;">
            <span style="font-weight:700;font-size:12.5px;">${escapeHtml(c.name)}</span>
            <span style="font-family:var(--mono);font-size:10.5px;color:var(--text-dim);"> · ${timeAgo(c.created_at)}</span>
            <div style="font-size:13px;line-height:1.4;">${escapeHtml(c.content)}</div>
          </div>
        </div>
      `).join("");
      inner = `
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
          ${list || `<div style="font-size:12.5px;color:var(--text-dim);">No comments yet.</div>`}
          <div style="display:flex;gap:6px;margin-top:10px;">
            <input data-commentinput="${postId}" placeholder="reply..." style="flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:var(--sans);outline:none;">
            <button class="btn" data-sendcomment="${postId}" style="padding:7px 12px;font-size:12.5px;">Reply</button>
          </div>
        </div>
      `;
    }
    return `<button class="del-btn" style="margin-left:${isOpen?"0":"auto"};" data-togglecomments="${postId}">💬 ${countLabel}</button>${inner}`;
  }

  function render(){
    // Don't blow away the DOM while someone's actively typing a comment —
    // that was the cause of comments vanishing mid-keystroke.
    const active = document.activeElement;
    if(active && active.matches && active.matches("[data-commentinput]")){
      return;
    }

    // Preserve scroll position relative to whichever post is currently nearest
    // the top of the viewport, so new content arriving above doesn't yank
    // the screen to a different post out from under you.
    let anchorId = null, beforeTop = null;
    const postEls = document.querySelectorAll(".post[data-postid]");
    let bestDist = Infinity;
    postEls.forEach(el => {
      const d = Math.abs(el.getBoundingClientRect().top - 80); // ~80px = below sticky header
      if(d < bestDist){ bestDist = d; anchorId = el.dataset.postid; beforeTop = el.getBoundingClientRect().top; }
    });

    doRender();

    if(anchorId){
      const afterEl = document.querySelector(`.post[data-postid="${anchorId}"]`);
      if(afterEl){
        const afterTop = afterEl.getBoundingClientRect().top;
        if(Math.abs(afterTop - beforeTop) > 1){
          window.scrollBy(0, afterTop - beforeTop);
        }
      }
    }
  }

  function doRender(){
    renderProfileBar();
    const feed = document.getElementById("feed");
    const list = profileHandle ? posts.filter(p => p.handle === profileHandle) : posts;
    if(!list.length){
      feed.innerHTML = profileHandle
        ? `<div class="empty"><span class="big">🫥</span>No posts from this person yet.</div>`
        : `<div class="empty"><span class="big">🪫</span>No one's posted their L's yet.<br>Be the first to overshare.</div>`;
      return;
    }
    feed.innerHTML = list.map(p => {
      const counts = {};
      const mine = {};
      reactions.filter(r => r.post_id === p.id).forEach(r => {
        counts[r.emoji] = (counts[r.emoji] || 0) + 1;
        if(currentUser && r.username === currentUser.handle) mine[r.emoji] = true;
      });
      const reactHtml = REACTIONS.map(e => {
        const n = counts[e] || 0;
        const active = mine[e] ? "active" : "";
        return `<button class="react ${active}" data-post="${p.id}" data-emoji="${e}">
          <span>${e}</span><span class="count">${n > 0 ? n : ""}</span>
        </button>`;
      }).join("");
      const isMine = currentUser && p.handle === currentUser.handle;
      const imgHtml = p.image_url ? `<img class="post-image" src="${escapeHtml(p.image_url)}" loading="lazy">` : "";
      return `<div class="post" data-postid="${p.id}">
        <div class="avatar" data-viewprofile="${escapeHtml(p.handle)}" style="cursor:pointer;overflow:hidden;">${avatarHtml(p.photo_url, p.avatar, 38)}</div>
        <div class="post-main">
          <div class="post-meta">
            <span class="pname" data-viewprofile="${escapeHtml(p.handle)}" style="cursor:pointer;">${escapeHtml(p.name)}</span>
            <span class="phandle" data-viewprofile="${escapeHtml(p.handle)}" style="cursor:pointer;">${escapeHtml(p.handle)}</span>
            <span class="ptime">· ${timeAgo(p.created_at)}</span>
            ${isMine ? `<button class="del-btn" data-delpost="${p.id}">delete</button>` : ""}
          </div>
          <div class="post-content">${escapeHtml(p.content)}</div>
          ${imgHtml}
          <div class="reactions">${reactHtml}</div>
          ${commentsHtml(p.id)}
        </div>
      </div>`;
    }).join("");

    feed.querySelectorAll(".react").forEach(btn => {
      btn.addEventListener("click", () => toggleReaction(btn.dataset.post, btn.dataset.emoji));
    });
    feed.querySelectorAll("[data-delpost]").forEach(btn => {
      btn.addEventListener("click", () => deletePost(btn.dataset.delpost));
    });
    feed.querySelectorAll("[data-viewprofile]").forEach(el => {
      el.addEventListener("click", () => { profileHandle = el.dataset.viewprofile; render(); });
    });
    feed.querySelectorAll("[data-togglecomments]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.togglecomments;
        if(openCommentPostIds.has(id)) openCommentPostIds.delete(id);
        else openCommentPostIds.add(id);
        render();
      });
    });
    feed.querySelectorAll("[data-sendcomment]").forEach(btn => {
      btn.addEventListener("click", () => sendComment(btn.dataset.sendcomment));
    });
    feed.querySelectorAll("[data-commentinput]").forEach(input => {
      input.addEventListener("keydown", e => {
        if(e.key === "Enter") sendComment(input.dataset.commentinput);
      });
    });
  }

  async function sendComment(postId){
    if(!currentUser) return;
    const input = document.querySelector(`[data-commentinput="${postId}"]`);
    const content = input.value.trim();
    if(!content) return;
    input.disabled = true;
    const {error} = await sb.from("comments").insert({
      post_id: postId,
      name: currentUser.name,
      handle: currentUser.handle,
      avatar: currentUser.avatar,
      photo_url: currentUser.photo_url || null,
      content,
    });
    input.disabled = false;
    if(error){ showToast("Couldn't post comment — try again."); console.error(error); return; }
    openCommentPostIds.add(postId);
  }

  setInterval(render, 15000);

  // ---------- RENDER: LEADERBOARD ----------
  function renderBoard(){
    const board = document.getElementById("board");
    const scored = posts.map(p => {
      const total = reactions.filter(r => r.post_id === p.id).length;
      return {post: p, total};
    }).filter(x => x.total > 0).sort((a,b) => b.total - a.total).slice(0, 10);

    if(!scored.length){
      board.innerHTML = `<div class="empty"><span class="big">🏆</span>No reactions yet.<br>React to something tragic to kick off the leaderboard.</div>`;
      return;
    }

    board.innerHTML = scored.map((x, i) => {
      const rankClass = i === 0 ? "gold" : "";
      return `<div class="board-item">
        <div class="board-rank ${rankClass}">${i+1}</div>
        <div class="board-avatar">${avatarHtml(x.post.photo_url, x.post.avatar, 22)}</div>
        <div class="board-body">
          <div class="bname">${escapeHtml(x.post.name)}</div>
          <div class="bcontent">${escapeHtml(x.post.content)}</div>
        </div>
        <div class="board-score">${x.total} 🔥</div>
      </div>`;
    }).join("");
  }

  function switchTab(tab){
    activeTab = tab;
    document.getElementById("tabFeed").classList.toggle("active", tab === "feed");
    document.getElementById("tabBoard").classList.toggle("active", tab === "board");
    document.getElementById("composerWrap").style.display = tab === "feed" ? "block" : "none";
    document.getElementById("feed").style.display = tab === "feed" ? "block" : "none";
    document.getElementById("board").style.display = tab === "board" ? "block" : "none";
    if(tab === "board") renderBoard();
  }
  document.getElementById("tabFeed").addEventListener("click", () => switchTab("feed"));
  document.getElementById("tabBoard").addEventListener("click", () => switchTab("board"));

  // ---------- DATA ----------
  let lastSignature = "";
  function dataSignature(){
    const lastPost = posts[0] ? posts[0].id : "";
    const lastComment = comments[comments.length-1] ? comments[comments.length-1].id : "";
    return `${posts.length}:${reactions.length}:${comments.length}:${lastPost}:${lastComment}`;
  }

  async function loadAll(notifyOnNew){
    const [{data: p, error: pe}, {data: r, error: re}, {data: c, error: ce}] = await Promise.all([
      sb.from("posts").select("*").order("created_at", {ascending:false}),
      sb.from("reactions").select("*"),
      sb.from("comments").select("*").order("created_at", {ascending:true}),
    ]);
    if(pe) console.error(pe);
    if(re) console.error(re);
    if(ce) console.error(ce);

    if(notifyOnNew && p){
      const newOnes = p.filter(post => !knownPostIds.has(post.id));
      if(newOnes.length && knownPostIds.size > 0){
        newOnes.forEach(post => {
          if(currentUser && post.handle !== currentUser.handle){
            maybeNotify("New post on TappedOut", `${post.name}: ${post.content.slice(0,80)}`);
          }
        });
      }
    }
    posts = p || [];
    knownPostIds = new Set(posts.map(x => x.id));
    reactions = r || [];
    comments = c || [];

    const sig = dataSignature();
    if(sig === lastSignature) return; // nothing actually changed — don't touch the DOM
    lastSignature = sig;

    render();
    if(activeTab === "board") renderBoard();
  }

  async function submitPost(){
    const input = document.getElementById("postInput");
    const content = input.value.trim();
    if((!content && !pendingImageFile) || !currentUser) return;

    const sinceLast = Date.now() - lastPostAt;
    if(sinceLast < POST_COOLDOWN_MS){
      showToast(`Slow down — wait ${Math.ceil((POST_COOLDOWN_MS-sinceLast)/1000)}s before posting again.`);
      return;
    }

    const postBtn = document.getElementById("postBtn");
    postBtn.disabled = true;
    postBtn.textContent = "Posting…";

    const image_url = await uploadImageIfNeeded();

    const {error} = await sb.from("posts").insert({
      name: currentUser.name,
      handle: currentUser.handle,
      avatar: currentUser.avatar,
      photo_url: currentUser.photo_url || null,
      content: content || "(just an image, no words)",
      image_url,
    });

    postBtn.disabled = false;
    postBtn.textContent = "Post";

    if(error){
      if(error.message && error.message.includes("rate_limited")){
        showToast("Slow down — one post every 10 seconds.");
      } else {
        showToast("Couldn't post — try again.");
        console.error(error);
      }
      return;
    }
    lastPostAt = Date.now();
    input.value = "";
    pendingImageDataUrl = null;
    pendingImageFile = null;
    document.getElementById("imageInput").value = "";
    renderImagePreview();
    document.getElementById("charcount").textContent = "0";
  }

  async function deletePost(postId){
    if(!confirm("Delete this post?")) return;
    const {error} = await sb.from("posts").delete().eq("id", postId);
    if(error){ showToast("Couldn't delete — try again."); console.error(error); }
  }

  async function toggleReaction(postId, emoji){
    if(!currentUser) return;
    const existing = reactions.find(r => r.post_id === postId && r.username === currentUser.handle && r.emoji === emoji);
    if(existing){
      await sb.from("reactions").delete().eq("id", existing.id);
    } else {
      await sb.from("reactions").insert({post_id: postId, username: currentUser.handle, emoji});
      const post = posts.find(p => p.id === postId);
      if(post && currentUser.handle !== post.handle){
        maybeNotify("Someone reacted on TappedOut", `${currentUser.name} reacted ${emoji} to ${post.name}'s post`);
      }
    }
  }

  // ---------- NOTIFICATIONS (lite — foreground/background tab only) ----------
  function maybeNotify(title, body){
    if(!notificationsOn) return;
    if(!("Notification" in window)) return;
    if(Notification.permission !== "granted") return;
    if(!document.hidden) return; // only notify if they're not actively looking at it
    try{ new Notification(title, {body, icon:""}); } catch(e){}
  }

  function updateNotifyBtn(){
    document.getElementById("notifyBtn").style.color = notificationsOn ? "var(--accent)" : "";
  }

  document.getElementById("notifyBtn").addEventListener("click", async () => {
    if(!("Notification" in window)){
      showToast("Notifications aren't supported in this browser.");
      return;
    }
    if(notificationsOn){
      notificationsOn = false;
      localStorage.setItem("tappedout_notify", "0");
      showToast("Notifications turned off.");
      updateNotifyBtn();
      return;
    }
    const perm = await Notification.requestPermission();
    if(perm === "granted"){
      notificationsOn = true;
      localStorage.setItem("tappedout_notify", "1");
      showToast("You'll get notified while this tab is open in the background. (Closing the tab fully still needs a bigger setup — ask if you want that built.)");
    } else {
      showToast("Notification permission denied.");
    }
    updateNotifyBtn();
  });

  // ---------- REALTIME ----------
  function subscribeRealtime(){
    sb.channel("tappedout-feed")
      .on("postgres_changes", {event:"*", schema:"public", table:"posts"}, () => { flashSync(); loadAll(true); })
      .on("postgres_changes", {event:"*", schema:"public", table:"reactions"}, () => { flashSync(); loadAll(false); })
      .on("postgres_changes", {event:"*", schema:"public", table:"comments"}, () => { flashSync(); loadAll(false); })
      .subscribe(status => {
        if(status === "SUBSCRIBED"){
          document.getElementById("synctext").textContent = "live · " + new Date().toLocaleTimeString();
        }
      });
  }

  // Safety net: even if the realtime websocket drops (browser throttling, network blips, etc.),
  // this guarantees the feed is never more than a few seconds stale.
  setInterval(() => loadAll(false), 4000);

  document.getElementById("refreshBtn").addEventListener("click", () => {
    loadAll(false);
    showToast("Refreshed");
  });

  // ---------- JOIN FLOW ----------
  function showJoin(){ document.getElementById("joinOverlay").classList.add("visible"); }
  function hideJoin(){ document.getElementById("joinOverlay").classList.remove("visible"); }
  function applyUserToHeader(){
    if(!currentUser) return;
    document.getElementById("meavatar").innerHTML = avatarHtml(currentUser.photo_url, currentUser.avatar, 18);
    document.getElementById("mename").textContent = currentUser.name;
  }

  document.getElementById("joinBtn").addEventListener("click", async () => {
    const name = document.getElementById("joinName").value.trim();
    if(!name) return;
    const btn = document.getElementById("joinBtn");
    btn.disabled = true;
    btn.textContent = "Joining…";
    let photo_url = null;
    if(pendingJoinPhotoFile){
      photo_url = await uploadToBucket("avatars", pendingJoinPhotoFile);
    }
    currentUser = { name, handle: makeHandle(name), avatar: randomAvatar(), photo_url };
    localStorage.setItem("tappedout_user", JSON.stringify(currentUser));
    applyUserToHeader();
    hideJoin();
    btn.disabled = false;
    btn.textContent = "Join the feed";
    render();
  });
  document.getElementById("joinName").addEventListener("keydown", e => {
    if(e.key === "Enter") document.getElementById("joinBtn").click();
  });

  document.getElementById("mebtn").addEventListener("click", showJoin);

  document.getElementById("postBtn").addEventListener("click", submitPost);
  document.getElementById("corporateBtn").addEventListener("click", async () => {
    const input = document.getElementById("postInput");
    const btn = document.getElementById("corporateBtn");
    if(!input.value.trim()) return;
    btn.disabled = true;
    btn.textContent = "Synergizing…";
    input.value = await corporatify(input.value);
    document.getElementById("charcount").textContent = input.value.length;
    btn.disabled = false;
    btn.textContent = "Make it LinkedIn-y 💼";
  });
  document.getElementById("postInput").addEventListener("input", e => {
    document.getElementById("charcount").textContent = e.target.value.length;
  });
  document.getElementById("postInput").addEventListener("keydown", e => {
    if(e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitPost();
  });

  // ---------- INIT ----------
  (function init(){
    if(currentUser){
      applyUserToHeader();
    } else {
      showJoin();
    }
    const urlHandle = new URLSearchParams(location.search).get("u");
    if(urlHandle) profileHandle = urlHandle;
    updateNotifyBtn();
    updateBattery();
    loadAll(false);
    subscribeRealtime();
  })();
</script>
</body>
</html>
